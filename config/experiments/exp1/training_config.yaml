# Exp1: AdamW + Warmup Cosine — no early stopping, full run
# Goal: establish a clean baseline with a stable LR schedule

batch_size: 32
epochs: 100
learning_rate: 0.0005
weight_decay: 0.01
optimizer: adamw
scheduler: warmup_cosine
warmup_epochs: 5
label_smoothing: 0.0
mixed_precision: true
early_stopping:
  enabled: false
  patience: 10
  min_delta: 0.001
checkpoint_dir: training/checkpoints/exp1
log_dir: training/logs/exp1
wandb:
  enabled: true
  project: MobileFCMViTv3
